name: Keepalive — 스케줄 워크플로우 활성 유지

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 KST 06:00 (스킬 검토 1시간 전)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive ping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive ping $(date +%Y-%m-%d)"
          git push
