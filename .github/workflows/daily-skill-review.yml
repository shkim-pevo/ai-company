name: 매일 GitHub 스킬 검토 → Slack

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  skill-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 팀별 GitHub 스킬 검토
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          DOW=$(date +%u)  # 1=월 ~ 7=일
          R="report.txt"

          echo ":mag: *팀별 추천 도구/스킬:*  ($DATE)" > "$R"

          TOTAL=0
          TEAM_COUNT=0

          # 이전에 추천한 레포 목록 (중복 방지)
          HISTORY_FILE=".github/skill-history.txt"
          touch "$HISTORY_FILE"

          search() {
            local icon="$1" name="$2"
            shift 2
            local queries=("$@")

            echo "[]" > _team.json
            for q in "${queries[@]}"; do
              raw=$(gh search repos "$q" --stars=">5000" --sort=stars --limit=10 \
                --json fullName,description,stargazersCount 2>/dev/null || echo "[]")
              jq -s '.[0] + .[1]' _team.json <(echo "$raw") > _tmp.json && mv _tmp.json _team.json
            done

            # 중복 제거 + 스타순 정렬 + 이미 추천한 레포 제외 + 상위 2개
            local history
            history=$(cat "$HISTORY_FILE" | tr '\n' '|' | sed 's/|$//')
            if [ -n "$history" ]; then
              jq --arg h "$history" '[group_by(.fullName)[] | max_by(.stargazersCount)] | [.[] | select(.fullName | test($h) | not)] | sort_by(-.stargazersCount) | limit(2;.[])' _team.json > _top.json
            else
              jq '[group_by(.fullName)[] | max_by(.stargazersCount)] | sort_by(-.stargazersCount) | limit(2;.[])' _team.json > _top.json
            fi

            local count
            count=$(jq -s 'length' _top.json)

            if [ "$count" -gt 0 ] 2>/dev/null; then
              echo "" >> "$R"
              echo "${icon} ${name}" >> "$R"
              TEAM_COUNT=$((TEAM_COUNT + 1))

              local idx=0
              while [ $idx -lt "$count" ]; do
                local repo stars desc short star_fmt
                repo=$(jq -rs ".[$idx].fullName" _top.json)
                stars=$(jq -rs ".[$idx].stargazersCount" _top.json)
                desc=$(jq -rs ".[$idx].description // \"설명 없음\"" _top.json)
                short="${repo##*/}"

                if [ "$stars" -ge 1000 ]; then
                  star_fmt="$(echo "scale=1; $stars / 1000" | bc)K"
                else
                  star_fmt="$stars"
                fi

                # 히스토리에 기록
                echo "$repo" >> "$HISTORY_FILE"

                echo "<https://github.com/${repo}|${short}> (${star_fmt} :star:) — ${desc}" >> "$R"
                TOTAL=$((TOTAL + 1))
                idx=$((idx + 1))
              done
            fi
            rm -f _team.json _top.json _tmp.json
          }

          # 요일별 키워드 로테이션 (매일 다른 검색어)
          case $DOW in
            1) # 월요일
              search ":computer:" "개발팀"         "claude code plugin" "AI coding agent"
              search ":art:"     "디자인팀"       "design system" "figma plugin"
              search ":shield:"  "보안팀"         "AI security" "vulnerability scanner"
              ;;
            2) # 화요일
              search ":gear:"          "DevOps팀"     "CI CD pipeline" "docker kubernetes"
              search ":headphones:"    "고객지원팀"   "customer support" "helpdesk"
              search ":bar_chart:"     "데이터팀"     "data pipeline" "ML evaluation"
              ;;
            3) # 수요일
              search ":bulb:"          "기획팀"       "product roadmap" "agile tool"
              search ":page_facing_up:" "문서화팀"    "API documentation" "technical writing"
              search ":briefcase:"     "세일즈팀"     "CRM" "sales automation"
              ;;
            4) # 목요일
              search ":computer:"      "개발팀"       "agentic framework" "developer tools"
              search ":chart_with_upwards_trend:" "마케팅팀" "content marketing" "SEO tool"
              search ":mag_right:"     "디자인리뷰팀" "visual regression" "screenshot testing"
              ;;
            5) # 금요일
              search ":art:"           "디자인팀"     "design tokens" "UI component"
              search ":shield:"        "보안팀"       "security testing" "OWASP"
              search ":bar_chart:"     "데이터팀"     "AI observability" "analytics dashboard"
              ;;
            6|7) # 주말
              search ":computer:"      "개발팀"       "open source AI" "LLM tools"
              search ":gear:"          "DevOps팀"     "infrastructure automation" "monitoring"
              search ":bulb:"          "기획팀"       "project management" "collaboration tool"
              ;;
          esac

          echo "" >> "$R"
          echo "_총 ${TEAM_COUNT}개 팀에서 ${TOTAL}개 추천. 적용 필요 시 알려주세요!_" >> "$R"
          echo "_이 리포트는 매일 오전 7시에 자동 발송됩니다._" >> "$R"

          cat "$R"

          # 히스토리 파일 커밋 (최근 100개만 유지)
          tail -100 "$HISTORY_FILE" > _tmp_hist && mv _tmp_hist "$HISTORY_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$HISTORY_FILE"
          git diff --cached --quiet || git commit -m "chore: 스킬 추천 히스토리 업데이트 ($DATE)" && git push || true

      - name: Slack 포스팅
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 미설정"
            cat report.txt
            exit 0
          fi

          TEXT=$(cat report.txt)
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg t "$TEXT" '{text:$t}')" \
            "$SLACK_WEBHOOK_URL" && echo "Slack 포스팅 완료" || echo "Slack 포스팅 실패"
