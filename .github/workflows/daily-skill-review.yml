name: 매일 GitHub 스킬 검토 → Slack

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  skill-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: GitHub 스킬 검토 (상위 3개)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          R="report.txt"

          # 매일 다른 키워드를 순환하여 검색 (요일 기반)
          DAY=$(date +%u)  # 1=월 ~ 7=일

          case $DAY in
            1) QUERIES=("claude code plugin" "AI coding agent" "agentic framework") ;;
            2) QUERIES=("design system" "design tokens" "UI component library") ;;
            3) QUERIES=("AI security" "vulnerability scanner" "MCP security") ;;
            4) QUERIES=("data pipeline" "ML evaluation" "AI observability") ;;
            5) QUERIES=("developer tools" "devops automation" "CI CD") ;;
            6) QUERIES=("AI agent" "multi agent" "agent orchestration") ;;
            7) QUERIES=("open source AI" "LLM tools" "AI productivity") ;;
          esac

          # 모든 키워드에서 결과 수집 → 스타 높은 순 정렬 → 상위 3개만
          echo "[]" > all_results.json

          for q in "${QUERIES[@]}"; do
            echo ">> 검색: $q"
            raw=$(gh search repos "$q" --stars=">500" --sort=stars --limit=5 \
              --json fullName,description,stargazersCount 2>/dev/null || echo "[]")
            # 기존 결과에 병합
            jq -s '.[0] + .[1]' all_results.json <(echo "$raw") > tmp.json && mv tmp.json all_results.json
          done

          # 중복 제거 + 스타순 정렬 + 상위 3개 추출
          jq '[group_by(.fullName)[] | max_by(.stargazersCount)] | sort_by(-.stargazersCount) | limit(3;.[])' all_results.json > top3.json

          COUNT=$(jq -s 'length' top3.json)
          echo "상위 $COUNT개 선정"

          # 리포트 작성
          echo ":mag: *GitHub 스킬 검토 리포트*  ($DATE)" > "$R"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> "$R"
          echo "" >> "$R"

          jq -r '
            .fullName as $repo |
            (.fullName | split("/")[1]) as $short |
            (if .stargazersCount >= 1000 then
              ((.stargazersCount / 1000 * 10 | floor) / 10 | tostring) + "K"
            else
              (.stargazersCount | tostring)
            end) as $stars |
            (.description // "설명 없음") as $desc |
            ":small_blue_diamond: <https://github.com/\($repo)|*\($short)*>  (\($stars) ★)\n    \($desc)\n"
          ' top3.json >> "$R"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> "$R"
          echo ":clock7: _매일 오전 7시 자동 발송  |  적용 필요 시 알려주세요!_" >> "$R"

          cat "$R"

      - name: Slack 포스팅
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 미설정"
            cat report.txt
            exit 0
          fi

          TEXT=$(cat report.txt)
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg t "$TEXT" '{text:$t}')" \
            "$SLACK_WEBHOOK_URL" && echo "Slack 포스팅 완료" || echo "Slack 포스팅 실패"
