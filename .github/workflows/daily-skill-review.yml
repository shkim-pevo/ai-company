name: 매일 팀별 GitHub 스킬 검토 → Slack

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  skill-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 22개 팀별 GitHub 검색
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          R="report.txt"

          echo ":mag: *팀별 추천 도구/스킬:*" > "$R"

          FOUND=0
          TEAM_FOUND=0

          search() {
            local icon="$1" name="$2" query="$3"
            echo ">> 검색: $name"

            local raw
            raw=$(gh search repos "$query" --stars=">50" --sort=stars --limit=3 --json fullName,description,stargazersCount 2>/dev/null || echo "[]")
            local len
            len=$(echo "$raw" | jq 'length' 2>/dev/null || echo "0")

            if [ "$len" -gt 0 ] 2>/dev/null; then
              echo "${icon} *${name}*" >> "$R"
              TEAM_FOUND=$((TEAM_FOUND + 1))

              # 각 레포를 인덱스로 접근 (서브쉘 방지)
              local idx=0
              while [ $idx -lt 2 ] && [ $idx -lt "$len" ]; do
                local repo stars desc repo_short star_fmt
                repo=$(echo "$raw" | jq -r ".[$idx].fullName")
                stars=$(echo "$raw" | jq -r ".[$idx].stargazersCount")
                desc=$(echo "$raw" | jq -r ".[$idx].description // \"설명 없음\"")
                repo_short="${repo##*/}"

                # 스타 포맷
                if [ "$stars" -ge 1000 ]; then
                  star_fmt="$(echo "scale=1; $stars / 1000" | bc)K"
                else
                  star_fmt="$stars"
                fi

                # 영문 → 한국어 번역
                case "$desc" in
                  *"Claude Code plugin that automatically captures"*) desc="Claude Code 세션 컨텍스트 캡처 및 자동 주입 플러그인" ;;
                  *"Claude Code plugin that shows what"*) desc="Claude Code 컨텍스트/에이전트/Todo 실시간 모니터링 HUD" ;;
                  *"Official"*"Anthropic"*"directory"*) desc="Anthropic 공식 Claude Code 플러그인 디렉토리" ;;
                  *"API documentation generator for JavaScript"*) desc="JavaScript API 문서 자동 생성" ;;
                  *"RESTful web API Documentation"*) desc="REST API 문서 자동 생성" ;;
                  *"Jest matcher for image comparisons"*) desc="Jest 이미지 비교 — 시각적 회귀 테스트 도구" ;;
                  *"curated list"*"regression testing"*) desc="시각적 회귀 테스트 리소스 큐레이션 목록" ;;
                  *"AI Security Scanner"*) desc="AI 에이전트/MCP 보안 스캐너 — 프롬프트 인젝션 및 추출 취약점 테스트" ;;
                  *"No description"*|"") desc="설명 없음" ;;
                esac

                echo "<https://github.com/${repo}|${repo_short}> (${star_fmt} :star:) — ${desc}" >> "$R"
                FOUND=$((FOUND + 1))
                idx=$((idx + 1))
              done
            else
              echo "   결과 없음"
            fi
          }

          search ":microscope:"          "조사팀"         "market research tool"
          search ":speech_balloon:"      "토론팀"         "AI debate framework"
          search ":clipboard:"           "종합팀"         "report generation AI"
          search ":white_check_mark:"    "퀄리티팀"       "fact checking AI tool"
          search ":bulb:"                "기획팀"         "PRD generator AI"
          search ":art:"                 "디자인팀"       "design system generator"
          search ":computer:"            "개발팀"         "claude code plugin"
          search ":gear:"                "DevOps팀"       "CI CD automation AI"
          search ":shield:"              "보안팀"         "AI security scanner"
          search ":chart_with_upwards_trend:" "마케팅팀"   "content generation AI marketing"
          search ":briefcase:"           "세일즈팀"       "pitch deck generator AI"
          search ":headphones:"          "고객지원팀"     "customer journey mapping tool"
          search ":bar_chart:"           "데이터팀"       "ML evaluation framework"
          search ":scales:"              "법무팀"         "legal document AI"
          search ":moneybag:"            "재무팀"         "SaaS metrics dashboard"
          search ":crown:"               "리더십팀"       "OKR framework tool"
          search ":page_facing_up:"      "문서화팀"       "API documentation generator"
          search ":rainbow:"             "브랜드팀"       "brand guidelines generator"
          search ":dart:"                "전략팀"         "TAM calculator market sizing"
          search ":pill:"                "추천엔진팀"     "healthcare recommendation AI"
          search ":busts_in_silhouette:" "인사팀"         "recruitment automation AI"
          search ":mag_right:"           "디자인리뷰팀"   "visual regression testing"

          echo "" >> "$R"
          echo "_총 ${TEAM_FOUND}개 팀에서 ${FOUND}개 추천. 적용 필요 시 알려주세요!_" >> "$R"
          echo "_이 리포트는 매일 오전 7시에 자동 발송됩니다._" >> "$R"

          echo "=== 총 ${TEAM_FOUND}개 팀, ${FOUND}개 발견 ==="
          cat "$R"

      - name: Slack 포스팅
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 미설정"
            cat report.txt
            exit 0
          fi

          TEXT=$(cat report.txt | head -80)
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg t "$TEXT" '{text:$t}')" \
            "$SLACK_WEBHOOK_URL" && echo "Slack 포스팅 완료" || echo "Slack 포스팅 실패"
