name: 매일 팀별 GitHub 스킬 검토 → Slack

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  skill-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 22개 팀별 GitHub 검색
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)

          echo ":mag: *매일 GitHub 스킬 검토 리포트* — $DATE" > report.txt
          echo "" >> report.txt
          echo "*추천 도구/스킬 요약:*" >> report.txt
          echo "" >> report.txt

          FOUND=0

          # 영어 description → 한국어 번역 함수
          translate() {
            sed \
              -e 's/A Claude Code plugin that automatically captures everything Claude does during your coding sessions, compresses it with AI.*$/Claude Code 세션 컨텍스트를 자동 캡처하고 AI로 압축하여 다음 세션에 주입하는 플러그인/g' \
              -e 's/A Claude Code plugin that shows what.*$/Claude Code 실시간 모니터링 — 컨텍스트, 도구, 에이전트, Todo 현황 표시/g' \
              -e 's/Official.*Anthropic.*managed.*directory.*$/Anthropic 공식 Claude Code 플러그인 디렉토리/g' \
              -e 's/No description/설명 없음/g' \
              -e 's/API documentation generator.*$/API 문서 자동 생성 도구/g' \
              -e 's/visual regression testing.*$/시각적 회귀 테스트 도구/g' \
              -e 's/An open source.*$/오픈소스 도구/g' \
              -e 's/A collection.*$/큐레이션 컬렉션/g' \
              -e 's/A curated.*$/큐레이션 목록/g'
          }

          search() {
            local team="$1" query="$2"
            echo ">> 검색 중: $team"

            local raw
            raw=$(gh search repos "$query" --stars=">50" --sort=stars --limit=3 --json fullName,description,stargazersCount 2>/dev/null || echo "[]")

            local len
            len=$(echo "$raw" | jq 'length' 2>/dev/null || echo "0")

            if [ "$len" -gt 0 ] 2>/dev/null; then
              echo "$raw" | jq -r --arg t "$team" \
                'limit(2;.[]) | ":small_blue_diamond: *\($t)* — <https://github.com/\(.fullName)|\(.fullName)> (\(.stargazersCount) :star:)\n> \(.description // "설명 없음")\n"' \
                | translate >> report.txt
              local added
              added=$(echo "$raw" | jq 'limit(2;.[]) | 1' | wc -l | tr -d ' ')
              FOUND=$((FOUND + added))
              echo "   발견: $added개"
            else
              echo "   결과 없음"
            fi
          }

          search "01-조사팀"       "market research tool"
          search "02-토론팀"       "AI debate framework"
          search "03-종합팀"       "report generation AI"
          search "04-퀄리티팀"     "fact checking AI tool"
          search "05-기획팀"       "PRD generator AI"
          search "06-디자인팀"     "design system generator"
          search "07-개발팀"       "claude code plugin"
          search "08-DevOps팀"     "CI CD automation AI"
          search "09-보안팀"       "AI security scanner"
          search "10-마케팅팀"     "content generation AI marketing"
          search "11-세일즈팀"     "pitch deck generator AI"
          search "12-고객지원팀"   "customer journey mapping tool"
          search "13-데이터팀"     "ML evaluation framework"
          search "14-법무팀"       "legal document AI"
          search "15-재무팀"       "SaaS metrics dashboard"
          search "16-리더십팀"     "OKR framework tool"
          search "17-문서화팀"     "API documentation generator"
          search "18-브랜드팀"     "brand guidelines generator"
          search "19-전략팀"       "TAM calculator market sizing"
          search "20-추천엔진팀"   "healthcare recommendation AI"
          search "21-인사팀"       "recruitment automation AI"
          search "22-디자인리뷰팀" "visual regression testing"

          echo "" >> report.txt
          echo "_총 ${FOUND}개 추천 발견. 적용 필요 시 알려주세요!_" >> report.txt

          echo "=== 총 발견: $FOUND개 ==="
          cat report.txt

      - name: Slack 포스팅
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL 미설정 — 리포트만 출력"
            cat report.txt
            exit 0
          fi

          TEXT=$(cat report.txt | head -60)
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg t "$TEXT" '{text:$t}')" \
            "$SLACK_WEBHOOK_URL" && echo "Slack 포스팅 완료" || echo "Slack 포스팅 실패"
